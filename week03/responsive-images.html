<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Images Activity</title>
    <link rel="stylesheet" href="styles/responsive-images.css">
</head>
<body>
    <header>
        <h1>Responsive Art Direction Gallery</h1>
    </header>

    <main>
        <div class="hero">
            <picture>
                <!-- Large screen version -->
                <source srcset="images/hero-large.webp" media="(min-width: 1000px)">
                <!-- Medium screen version -->
                <source srcset="images/hero-medium.webp" media="(min-width: 500px)">
                <!-- Fallback / Small mobile version (with explicit aspect ratio dimensions) -->
                <img src="images/hero-small.webp" alt="Beautiful landscape of a modern architectural temple structure" width="1500" height="750" loading="lazy">
            </picture>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 | Responsive Images Activity | eduardo sanabria</p>
    </footer>
</body>
</html>
